openapi: 3.0.3
info:
  title: LocalScript API
  description: 
  version: 1.0.0

servers:
  - url: http://localhost:8080

paths:
  /generate:
    post:
      summary: Сгенерировать код по тексту задачи
      operationId: generate
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [prompt]
              properties:
                prompt:
                  type: string
                  description: Текст задачи на естественном языке
            example:
              prompt: "Функция factorial(n) для n >= 0"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [code]
                properties:
                  code:
                    type: string
                    description: Сгенерированный Lua-код
              example:
                code: |
                  function factorial(n)
                    if n <= 1 then return 1 end
                    return n * factorial(n - 1)
                  end
