<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LocalScript Phase 1</title>
  <style>
    body { font-family: Segoe UI, sans-serif; margin: 24px; }
    textarea { width: 100%; min-height: 120px; }
    button { margin-top: 12px; padding: 8px 14px; }
    pre { background: #f5f5f5; border: 1px solid #ddd; padding: 12px; white-space: pre-wrap; }
    .error { color: #8b0000; }
  </style>
</head>
<body>
  <h1>LocalScript — Фаза 1</h1>
  <p>Генерация и валидация YAML через Ollama + protocollab.</p>
  <textarea id="prompt" placeholder="Опиши задачу...">Из полученного списка email получи последний.</textarea>
  <br />
  <button id="generate">Сгенерировать</button>

  <h2>Результат</h2>
  <pre id="output"></pre>

  <script>
    const output = document.getElementById('output');
    document.getElementById('generate').addEventListener('click', async () => {
      output.classList.remove('error');
      output.textContent = 'Выполняется...';
      const prompt = document.getElementById('prompt').value;
      try {
        const resp = await fetch('/generate', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ prompt })
        });
        const data = await resp.json();
        if (!resp.ok) {
          output.classList.add('error');
          output.textContent = JSON.stringify(data.detail ?? data, null, 2);
          return;
        }
        output.textContent = JSON.stringify(data, null, 2);
      } catch (e) {
        output.classList.add('error');
        output.textContent = String(e);
      }
    });
  </script>
</body>
</html>
