<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LocalScript YAML API</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: Segoe UI, -apple-system, sans-serif;
      margin: 0;
      padding: 20px;
      background: #f9f9f9;
      color: #333;
    }
    .container { max-width: 1200px; margin: 0 auto; }
    h1 { color: #1a73e8; margin-top: 0; }
    h2 { color: #4285f4; border-bottom: 2px solid #e8f0fe; padding-bottom: 8px; margin-top: 24px; }
    
    .section {
      background: white;
      border: 1px solid #ddd;
      border-radius: 4px;
      padding: 20px;
      margin-bottom: 20px;
    }
    
    .form-group {
      margin-bottom: 12px;
    }
    
    label {
      display: block;
      margin-bottom: 4px;
      font-weight: 500;
      color: #202124;
    }
    
    textarea {
      width: 100%;
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-family: Consolas, monospace;
      min-height: 100px;
      resize: vertical;
    }
    
    input[type="text"], input[type="number"] {
      width: 100%;
      padding: 8px;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 14px;
    }
    
    button {
      background: #1a73e8;
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      margin-top: 12px;
      margin-right: 8px;
      transition: background 0.2s;
    }
    
    button:hover { background: #1557b0; }
    button:disabled { background: #ccc; cursor: not-allowed; }
    
    .output {
      background: #f5f5f5;
      border: 1px solid #ddd;
      border-radius: 4px;
      padding: 12px;
      margin-top: 12px;
      white-space: pre-wrap;
      font-family: Consolas, monospace;
      font-size: 12px;
      max-height: 400px;
      overflow: auto;
      word-break: break-word;
    }
    
    .output.error {
      background: #fef7f7;
      border-color: #f4cccc;
      color: #8b0000;
    }
    
    .output.success {
      background: #f1f8e9;
      border-color: #c5e1a5;
      color: #33691e;
    }
    
    .lua-code {
      background: #f5f5f5;
      border: 1px solid #ddd;
      border-radius: 4px;
      padding: 12px;
      margin-top: 12px;
      font-family: Consolas, monospace;
      font-size: 12px;
      white-space: pre-wrap;
      word-break: break-word;
      max-height: 300px;
      overflow: auto;
    }
    
    .grid-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-bottom: 20px;
    }
    
    .hidden { display: none; }
    
    .status {
      padding: 8px 12px;
      border-radius: 4px;
      margin-top: 12px;
      font-size: 13px;
    }
    
    .status.loading { background: #e3f2fd; color: #1565c0; }
    .status.success { background: #c8e6c9; color: #2e7d32; }
    .status.error { background: #ffcdd2; color: #c62828; }
  </style>
</head>
<body>
  <div class="container">
    <h1>🚀 LocalScript YAML Runtime API</h1>
    <p>День 1-4: Генерация YAML, уточнение, и Lua выполнение.</p>

    <!-- SECTION 1: GENERATE -->
    <div class="section">
      <h2>📝 1. Генерация YAML</h2>
      <div class="form-group">
        <label for="prompt">Задача</label>
        <textarea id="prompt" placeholder="Пример: Из полученного списка email получи последний">Из полученного списка email получи последний.</textarea>
      </div>
      <button id="btnGenerate">Сгенерировать</button>
      <div id="generateStatus" class="hidden status"></div>
      <div id="generateOutput" class="hidden output"></div>
    </div>

    <!-- SECTION 2: ASK (conditional) -->
    <div class="section hidden" id="askSection">
      <h2>❓ 2. Уточнить</h2>
      <p id="feedbackText"></p>
      <div class="form-group">
        <label for="question">Вопрос</label>
        <textarea id="question" placeholder="Опиши нужные уточнения..."></textarea>
      </div>
      <button id="btnAsk">Отправить уточнение</button>
      <button id="btnAskReset">Вернуться к генерации</button>
      <div id="askStatus" class="hidden status"></div>
      <div id="askOutput" class="hidden output"></div>
    </div>

    <!-- SECTION 3: EXECUTE -->
    <div class="section hidden" id="executeSection">
      <h2>⚡ 3. Выполнить Lua код</h2>
      <p id="operationText"></p>
      
      <div class="lua-code" id="luaCode"></div>
      
      <div class="form-group">
        <label for="contextJson">Контекст (JSON, опционально)</label>
        <textarea id="contextJson" placeholder='{"data": [1, 2, 3]}' style="min-height: 80px;"></textarea>
      </div>
      
      <button id="btnExecute">Выполнить</button>
      <button id="btnExecuteReset">Вернуться</button>
      <div id="executeStatus" class="hidden status"></div>
      
      <div id="executeResults" class="hidden">
        <h3>Результаты выполнения</h3>
        <div class="form-group">
          <label>Статус</label>
          <div id="execStatus" class="output"></div>
        </div>
        <div class="form-group">
          <label>Stdout</label>
          <div id="execStdout" class="output"></div>
        </div>
        <div class="form-group">
          <label>Stderr</label>
          <div id="execStderr" class="output"></div>
        </div>
        <div class="form-group">
          <label>Exit code</label>
          <div id="execExitCode" class="output"></div>
        </div>
      </div>
    </div>
  </div>

  <script>
    let currentSession = null;
    let currentYaml = null;

    function showStatus(elementId, text, type) {
      const elem = document.getElementById(elementId);
      elem.textContent = text;
      elem.className = `status ${type} hidden`;
      if (text) elem.classList.remove('hidden');
    }

    function showOutput(elementId, text, isError = false) {
      const elem = document.getElementById(elementId);
      elem.textContent = text;
      elem.className = `output hidden ${isError ? 'error' : ''}`;
      if (text) elem.classList.remove('hidden');
    }

    // GENERATE
    document.getElementById('btnGenerate').addEventListener('click', async () => {
      const prompt = document.getElementById('prompt').value.trim();
      if (!prompt) {
        showStatus('generateStatus', 'Введите задачу', 'error');
        return;
      }

      showStatus('generateStatus', 'Генерирую...', 'loading');
      showOutput('generateOutput', '');
      document.getElementById('askSection').classList.add('hidden');
      document.getElementById('executeSection').classList.add('hidden');

      try {
        const resp = await fetch('/generate', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ prompt })
        });

        const data = await resp.json();
        if (!resp.ok) {
          showStatus('generateStatus', `Ошибка: ${data.detail?.message || JSON.stringify(data.detail)}`, 'error');
          showOutput('generateOutput', JSON.stringify(data.detail, null, 2), true);
          return;
        }

        currentSession = data.session_id;
        currentYaml = data.yaml;

        if (data.is_complete) {
          showStatus('generateStatus', `✓ YAML сгенерирована (попытка ${data.attempts})`, 'success');
          document.getElementById('executeSection').classList.remove('hidden');
          document.getElementById('operationText').textContent = `Операция: ${currentYaml.operation || '?'}`;
          // Try to show Lua preview
          previewLua(currentYaml);
        } else {
          showStatus('generateStatus', `❌ Валидация не прошла (попытка ${data.attempts})`, 'error');
          if (data.feedback && data.feedback.length > 0) {
            const fb = data.feedback[0];
            const feedbackMsg = `Поле: ${fb.field}\nОшибка: ${fb.message}\nОжидается: ${fb.expected}\nПолучено: ${fb.got}${fb.hint ? '\nПодсказка: ' + fb.hint : ''}`;
            showOutput('generateOutput', feedbackMsg, true);
            document.getElementById('feedbackText').textContent = feedbackMsg;
            document.getElementById('askSection').classList.remove('hidden');
          }
        }
      } catch (e) {
        showStatus('generateStatus', `Исключение: ${e.message}`, 'error');
        showOutput('generateOutput', String(e), true);
      }
    });

    // ASK
    document.getElementById('btnAsk').addEventListener('click', async () => {
      if (!currentSession) {
        showStatus('askStatus', 'Сессия потеряна', 'error');
        return;
      }

      const question = document.getElementById('question').value.trim();
      if (!question) {
        showStatus('askStatus', 'Введите вопрос', 'error');
        return;
      }

      showStatus('askStatus', 'Обрабатываю...', 'loading');
      showOutput('askOutput', '');

      try {
        const resp = await fetch('/ask', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ session_id: currentSession, question })
        });

        const data = await resp.json();
        if (!resp.ok) {
          showStatus('askStatus', `Ошибка: ${data.detail?.message || JSON.stringify(data.detail)}`, 'error');
          showOutput('askOutput', JSON.stringify(data.detail, null, 2), true);
          return;
        }

        currentYaml = data.yaml;
        if (data.is_complete) {
          showStatus('askStatus', `✓ YAML обновлена (попытка ${data.attempts})`, 'success');
          document.getElementById('askSection').classList.add('hidden');
          document.getElementById('executeSection').classList.remove('hidden');
          document.getElementById('operationText').textContent = `Операция: ${currentYaml.operation || '?'}`;
          previewLua(currentYaml);
        } else {
          showStatus('askStatus', `❌ Всё ещё ошибка (попытка ${data.attempts})`, 'error');
          if (data.feedback && data.feedback.length > 0) {
            const fb = data.feedback[0];
            const feedbackMsg = `Поле: ${fb.field}\nОшибка: ${fb.message}`;
            document.getElementById('feedbackText').textContent = feedbackMsg;
            document.getElementById('question').value = '';
            showOutput('askOutput', feedbackMsg, true);
          }
        }
      } catch (e) {
        showStatus('askStatus', `Исключение: ${e.message}`, 'error');
        showOutput('askOutput', String(e), true);
      }
    });

    document.getElementById('btnAskReset').addEventListener('click', () => {
      document.getElementById('askSection').classList.add('hidden');
      document.getElementById('question').value = '';
      showOutput('askOutput', '');
    });

    // EXECUTE
    document.getElementById('btnExecute').addEventListener('click', async () => {
      if (!currentYaml) {
        showStatus('executeStatus', 'Нет YAML для выполнения', 'error');
        return;
      }

      showStatus('executeStatus', 'Выполняю...', 'loading');
      document.getElementById('executeResults').classList.add('hidden');

      try {
        const contextStr = document.getElementById('contextJson').value.trim();
        let context = null;
        if (contextStr) {
          try {
            context = JSON.parse(contextStr);
          } catch (e) {
            showStatus('executeStatus', `Ошибка JSON контекста: ${e.message}`, 'error');
            return;
          }
        }

        const resp = await fetch('/execute', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            yaml: currentYaml,
            context: context
          })
        });

        const data = await resp.json();
        if (!resp.ok) {
          showStatus('executeStatus', `Ошибка: ${data.detail?.message || JSON.stringify(data.detail)}`, 'error');
          return;
        }

        const execResult = data.execution_result;
        document.getElementById('luaCode').textContent = data.lua_code || document.getElementById('luaCode').textContent;
        showStatus('executeStatus', `✓ Выполнено (статус: ${execResult.status})`, execResult.status === 'success' ? 'success' : 'error');
        
        document.getElementById('execStatus').textContent = execResult.status;
        document.getElementById('execStdout').textContent = execResult.stdout || '(пусто)';
        document.getElementById('execStderr').textContent = execResult.stderr || '(пусто)';
        document.getElementById('execExitCode').textContent = String(execResult.exit_code);
        document.getElementById('executeResults').classList.remove('hidden');
      } catch (e) {
        showStatus('executeStatus', `Исключение: ${e.message}`, 'error');
      }
    });

    document.getElementById('btnExecuteReset').addEventListener('click', () => {
      document.getElementById('executeSection').classList.add('hidden');
      document.getElementById('contextJson').value = '';
      document.getElementById('executeResults').classList.add('hidden');
    });

    function previewLua(yaml) {
      // Placeholder: in real implementation, /execute would return lua_code
      // For now, show operation and parameters
      const code = `-- Operation: ${yaml.operation || '?'}\n-- Parameters: ${JSON.stringify(yaml.parameters || {})}`;
      document.getElementById('luaCode').textContent = code;
    }
  </script>
</body>
</html>
